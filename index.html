<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBZ Tipovačka - Hlavní rozcestník</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Specifické dlaždice jen pro tuto úvodní stránku */
        .intro-logo { max-width: 300px; margin: 40px auto; display: block; filter: drop-shadow(0 0 20px rgba(0, 136, 255, 0.3)); }
        
        .tiles-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 900px; margin: 0 auto 50px; }
        
        .tile { 
            background: linear-gradient(145deg, var(--bg-card), #101520); 
            border: 2px solid var(--border-color); border-radius: 16px; 
            padding: 30px 20px; text-align: center; text-decoration: none; 
            color: #fff; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        .tile:hover { transform: translateY(-8px); border-color: var(--accent-blue); box-shadow: 0 10px 30px rgba(0, 136, 255, 0.2); }
        .tile.active-form { border-color: var(--accent-yellow); box-shadow: 0 0 20px rgba(255, 215, 0, 0.1); }
        .tile.active-form:hover { border-color: var(--accent-yellow); box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3); }
        
        .tile-icon { font-size: 3rem; margin-bottom: 15px; color: var(--accent-blue); }
        .active-form .tile-icon { color: var(--accent-yellow); }
        
        .tile-title { font-family: 'Oswald', sans-serif; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 10px; }
        .tile-desc { color: var(--text-muted); font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Zde se načte tvůj obrázek kbz_logo.png -->
        <img src="kbz_logo.png" alt="KBZ Logo" class="intro-logo" onerror="this.style.display='none'">
        
        <!-- Nadpis, pokud by se obrázek nenačetl -->
        <header>
            <div class="logo-text">Vítejte v <span>KBZ Tipovačce</span></div>
        </header>

        <div class="section-title" style="border: none;">Aktivní tipovačky</div>
        <div class="tiles-container">
            <!-- Dlaždice formuláře (Zlatá) -->
            <a href="2627_formchanceliga.html" class="tile active-form">
                <div class="tile-icon">✍️</div>
                <div class="tile-title">Tipovat Chance Ligu</div>
                <div class="tile-desc">Ročník 2026/2027</div>
            </a>
        </div>

        <div class="section-title">Vyhodnocené soutěže</div>
        <div class="tiles-container">
            <!-- Dlaždice Chance liga -->
            <a href="2526_chanceliga.html" class="tile">
                <div class="tile-icon">🏆</div>
                <div class="tile-title">Chance liga</div>
                <div class="tile-desc">Výsledky ročníku 2025/2026</div>
            </a>

            <!-- Dlaždice 2. liga -->
            <a href="2526_chnl.html" class="tile">
                <div class="tile-icon">🥈</div>
                <div class="tile-title">Chance Národní liga</div>
                <div class="tile-desc">Výsledky ročníku 2025/2026</div>
            </a>
        </div>
    </div>

</body>
</html>
