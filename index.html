<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBZ Tipovačka - Hlavní rozcestník</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .intro-logo { max-width: 300px; margin: 40px auto; display: block; filter: drop-shadow(0 0 20px rgba(1, 254, 1, 0.3)); }
        .tiles-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; max-width: 900px; margin: 0 auto 50px; }
        
        .tile { background: linear-gradient(145deg, var(--bg-card), #101520); border: 2px solid var(--border-color); border-radius: 16px; padding: 30px 20px; text-align: center; text-decoration: none; color: #fff; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tile:hover { transform: translateY(-8px); border-color: var(--accent-primary); box-shadow: 0 10px 30px rgba(1, 254, 1, 0.2); }
        .tile.active-form { border-color: var(--accent-primary); box-shadow: 0 0 20px rgba(1, 254, 1, 0.1); }
        .tile.active-form:hover { border-color: var(--accent-primary); box-shadow: 0 10px 30px rgba(1, 254, 1, 0.3); }
        .tile-icon { font-size: 3rem; margin-bottom: 15px; color: var(--accent-primary); }
        .tile-title { font-family: 'Oswald', sans-serif; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 10px; }
        .tile-desc { color: var(--text-muted); font-size: 0.9rem; }
        
        /* Třídy pro vybarvené dlaždice, které natvrdo přebijí tmavý gradient */
        .tile-chance { background: #eaff00 !important; border-color: #eaff00 !important; box-shadow: 0 10px 20px rgba(234, 255, 0, 0.2) !important; }
        .tile-chnl { background: #00ffa3 !important; border-color: #00ffa3 !important; box-shadow: 0 10px 20px rgba(0, 255, 163, 0.2) !important; }
    </style>
</head>
<body>

    <div class="container">
        <img src="kbz_logo.png" alt="KBZ Logo" class="intro-logo" onerror="this.style.display='none'">
        
        <header>
            <div class="logo-text">Vítejte v <span>KBZ Tipovačce</span></div>
        </header>

        <div class="section-title" style="border: none;">Aktivní tipovačky</div>
        <div class="tiles-container">
            <a href="2627_formchanceliga.html" class="tile tile-chance">
                <img src="Chance_Liga.png" alt="Chance liga" style="height: 80px; width: 100%; object-fit: contain; margin-bottom: 15px;">
                <div class="tile-title" style="color: #000;">Tip Chance ligy</div>
                <div class="tile-desc" style="color: #333; font-weight: 600;">Ročník 2026/2027</div>
            </a>

            <a href="2627_formchancenarodniliga.html" class="tile tile-chnl">
                <img src="chance-narodni-liga.png" alt="Chance národní liga" style="height: 80px; width: 100%; object-fit: contain; margin-bottom: 15px;">
                <div class="tile-title" style="color: #000;">Tip Chance Národní ligy</div>
                <div class="tile-desc" style="color: #333; font-weight: 600;">Ročník 2026/2027</div>
            </a>
        </div>

        <div class="section-title">Vyhodnocené soutěže</div>
        <div class="tiles-container">
            <a href="2526_chanceliga.html" class="tile tile-chance">
                <img src="Chance_Liga.png" alt="Chance liga" style="height: 80px; width: 100%; object-fit: contain; margin-bottom: 15px;">
                <div class="tile-title" style="color: #000;">Chance liga</div>
                <div class="tile-desc" style="color: #333; font-weight: 600;">Výsledky ročníku 2025/2026</div>
            </a>

            <a href="2526_chnl.html" class="tile tile-chnl">
                <img src="chance-narodni-liga.png" alt="Chance národní liga" style="height: 80px; width: 100%; object-fit: contain; margin-bottom: 15px;">
                <div class="tile-title" style="color: #000;">Chance Národní liga</div>
                <div class="tile-desc" style="color: #333; font-weight: 600;">Výsledky ročníku 2025/2026</div>
            </a>
        </div>
    </div>

</body>
</html>
